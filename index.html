<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App recetas</title>
    <link rel="stylesheet" href="./dist/css/style.css">
</head>
<body class="body">
    <header class="header">
        <a href="./index.html"><h1 class="header__title">Buscador <span>de</span> recetas</h1></a>

        <button class="menu__btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path fill="rgb(208, 209, 210)" d="M0 96C0 78.3 14.3 64 32 64l384 0c17.7 0 32 14.3 32 32s-14.3 32-32 32L32 128C14.3 128 0 113.7 0 96zM0 256c0-17.7 14.3-32 32-32l384 0c17.7 0 32 14.3 32 32s-14.3 32-32 32L32 288c-17.7 0-32-14.3-32-32zM448 416c0 17.7-14.3 32-32 32L32 448c-17.7 0-32-14.3-32-32s14.3-32 32-32l384 0c17.7 0 32 14.3 32 32z"/></svg>
        </button>

        <nav class="menu">
            <ul class="menu__ul">
                <li><a class="menu__element menu__element--selected" href="./index.html">Inicio</a></li>
                <li><a class="menu__element" href="./favoritos.html">Mis favoritos</a></li>
            </ul>
        </nav>
    </header>

    <main class="main">
        <h2 class="main__title">Inicio</h2>

        <form class="form">
            <div class="campo">
                <label for="categoria">Categoría</label>

                <select class="categoria" name="categoria" id="categoria">
                    <option value="" selected disabled>-- Seleccione --</option>
                </select>
            </div>
        </form>
        
        <div class="resultados">
            <h2 class="resultados__title">Resultados</h2>
            <div class="card-container">
            </div>

        </div>
    </main>

    <div class="modal"></div>

    <div class="notificacion">
        <section class="notificacion__header">
            <h5 class="notificacion__title">App recetas</h5>
            <button class="notificacion__cerrar">&times;</button>
        </section>
        <p class="notificacion__contenido"></p>
    </div>
    
    <script src="./dist/js/app.js" type="module"></script>
</body>
</html>
